{% if session.pending_square %}
<div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 space-y-4">
        <h2 class="text-lg font-semibold text-gray-800">Who did you meet?</h2>
        
        <div class="bg-blue-50 p-4 rounded border-l-4 border-seahawks-navy">
            <p class="text-sm text-gray-700 font-medium">{{ session.pending_square.text }}</p>
        </div>
        
        <form hx-post="/name/{{ session.pending_square.id }}" 
              hx-target="#game-container"
              hx-swap="outerHTML"
              class="space-y-3">
            <div>
                <label for="player_name" class="block text-sm font-medium text-gray-700 mb-2">
                    Person's Name
                </label>
                <input 
                    type="text"
                    id="player_name"
                    name="player_name"
                    class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-seahawks-navy"
                    placeholder="Enter their name"
                    autofocus
                    required>
            </div>
            
            <div class="flex gap-2">
                <button
                    type="submit"
                    class="flex-1 bg-seahawks-green text-white font-semibold py-2 rounded hover:bg-opacity-90 transition-colors">
                    Save & Mark
                </button>
                <button
                    type="button"
                    hx-post="/dismiss-name-modal"
                    hx-target="#game-container"
                    hx-swap="outerHTML"
                    class="flex-1 bg-gray-200 text-gray-800 font-semibold py-2 rounded hover:bg-gray-300 transition-colors">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>
{% endif %}
