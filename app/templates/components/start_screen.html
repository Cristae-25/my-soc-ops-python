<div id="game-container">
  <div
    class="flex flex-col items-center justify-center min-h-full p-6 bg-seahawks-light"
  >
    <div class="text-center max-w-sm">
      <h1 class="text-5xl font-bold text-seahawks-navy mb-2">🦅</h1>
      <h1 class="text-4xl font-bold text-seahawks-navy mb-2">Seahawks Bingo</h1>
      <p class="text-lg text-seahawks-blue mb-8">Social Bingo Game</p>

      <div
        class="bg-white rounded-lg p-6 shadow-sm border-2 border-seahawks-navy mb-8"
      >
        <h2 class="font-semibold text-seahawks-navy mb-3 text-lg">
          Choose Your Mode
        </h2>
        <p class="text-gray-700 text-sm mb-4">Pick how you want to play:</p>
        <ul class="text-left text-gray-700 text-sm space-y-2 mb-4">
          <li><strong>🎲 Bingo Mode:</strong> Get 5 in a row to win!</li>
          <li>
            <strong>📝 Scavenger Hunt:</strong> Check off all 24 items to win!
          </li>
        </ul>
      </div>

      <div class="flex flex-col gap-3">
        <button
          hx-post="/start?mode=bingo"
          hx-target="#game-container"
          hx-swap="outerHTML"
          class="w-full bg-seahawks-green text-white font-semibold py-4 px-8 rounded-lg text-lg hover:opacity-90 transition-opacity"
        >
          🎲 Bingo Mode
        </button>
        <button
          hx-post="/start?mode=scavenger_hunt"
          hx-target="#game-container"
          hx-swap="outerHTML"
          class="w-full bg-seahawks-blue text-white font-semibold py-4 px-8 rounded-lg text-lg hover:opacity-90 transition-opacity"
        >
          📝 Scavenger Hunt
        </button>
      </div>
    </div>
  </div>
</div>
